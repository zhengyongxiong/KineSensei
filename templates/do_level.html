<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>开始学习 - {{ level.name }}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f0f2f5; text-align: center; padding: 10px; margin: 0; }
    .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.05); }
    
    /* 视频区域容器 */
    .video-wrapper {
      position: relative;
      width: 100%;
      max-width: 640px;
      margin: 10px auto;
      border-radius: 8px;
      overflow: hidden;
      background: #000;
      aspect-ratio: 4/3; /* 保持比例 */
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover; /* 填充整个区域 */
      transform: scaleX(-1); /* 镜像显示 */
    }

    /* 状态覆盖层 */
    .status-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 8px;
      font-size: 14px;
    }

    .btn {
      display: inline-block;
      margin: 8px 4px;
      padding: 10px 20px;
      background: #007bff;
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.98); }
    .btn-danger { background: #dc3545; }
    .btn-secondary { background: #6c757d; }

    #confidence_bar {
      height: 6px;
      width: 100%;
      background: #e9ecef;
      margin-top: 0;
      position: absolute;
      top: 0;
      left: 0;
    }
    #confidence_fill {
      height: 100%;
      width: 0;
      background: #28a745;
      transition: width 0.3s ease;
    }

    /* 移动端优化 */
    @media (max-width: 600px) {
      .container { padding: 10px; }
      h2 { font-size: 1.2rem; margin: 10px 0; }
      p { font-size: 0.9rem; margin: 5px 0; }
    }
  </style>
</head>
<body>

<div class="container">
  <h2>🎬 {{ level.name }}</h2>
  <p class="text-muted">{{ level.course.title }} | 目标: {{ level.action_name }}</p>

  {% if level.video_url %}
    <p><a href="{{ level.video_url }}" target="_blank" class="btn btn-secondary" style="padding: 5px 10px; font-size: 12px;">🎥 查看示范</a></p>
  {% endif %}

  <div class="video-wrapper">
    <div id="confidence_bar"><div id="confidence_fill"></div></div>
    <!-- 使用 video 标签直接显示本地摄像头 -->
    <video id="local_video" autoplay playsinline webkit-playsinline muted></video>
    <div class="status-overlay" id="status_text">等待摄像头权限...</div>
  </div>

  <!-- 隐藏的 canvas 用于截帧 -->
  <canvas id="capture_canvas" style="display:none;"></canvas>

  <div class="controls">
    <button class="btn" id="start_btn">▶️ 开始识别</button>
    <button class="btn btn-danger" id="stop_btn" style="display:none;">⛔ 停止</button>
    <button class="btn btn-secondary" id="switch_cam_btn">🔄 切换镜头</button>
  </div>
  
  <br>
  <a href="{{ url_for('learn_course', course_id=level.course_id) }}" style="color: #6c757d; font-size: 14px; text-decoration: none;">← 返回课程列表</a>
</div>

<script>
const video = document.getElementById('local_video');
const canvas = document.getElementById('capture_canvas');
const ctx = canvas.getContext('2d');
const statusText = document.getElementById('status_text');
const confidenceFill = document.getElementById('confidence_fill');

const startBtn = document.getElementById('start_btn');
const stopBtn = document.getElementById('stop_btn');
const switchBtn = document.getElementById('switch_cam_btn');

let stream = null;
let intervalId = null;
let isRecognizing = false;
let currentFacingMode = 'user'; // 默认前置

// 1. 启动摄像头
async function startCamera() {
  try {
    if (stream) {
      stream.getTracks().forEach(track => track.stop());
    }
    
    const constraints = {
      video: {
        facingMode: currentFacingMode,
        width: { ideal: 640 },
        height: { ideal: 480 }
      },
      audio: false
    };

    stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = stream;
    
    video.onloadedmetadata = () => {
      video.play();
      statusText.textContent = "摄像头已就绪，点击'开始识别'";
    };
  } catch (err) {
    console.error("Camera Error:", err);
    statusText.textContent = "无法访问摄像头: " + err.message;
    alert("无法访问摄像头，请确保您在 HTTPS 环境下，并允许浏览器访问摄像头。");
  }
}

// 2. 切换摄像头
switchBtn.onclick = () => {
  currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
  // 后置摄像头不需要镜像
  video.style.transform = currentFacingMode === 'user' ? 'scaleX(-1)' : 'none';
  startCamera();
};

// 3. 开始识别循环
startBtn.onclick = () => {
  if (!stream) { alert("请先开启摄像头"); return; }
  
  isRecognizing = true;
  startBtn.style.display = 'none';
  stopBtn.style.display = 'inline-block';
  statusText.textContent = "正在识别中...";
  
  // 每 800ms 发送一帧 (避免服务器过载)
  intervalId = setInterval(captureAndSend, 800);
};

// 4. 停止识别
stopBtn.onclick = () => {
  isRecognizing = false;
  clearInterval(intervalId);
  startBtn.style.display = 'inline-block';
  stopBtn.style.display = 'none';
  statusText.textContent = "已暂停识别";
  confidenceFill.style.width = '0%';
};

// 5. 核心：截帧并发送到后端
async function captureAndSend() {
  if (!video.videoWidth) return;

  // 设置 canvas 大小
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  
  // 绘制当前帧
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  
  // 转为 Blob
  canvas.toBlob(async (blob) => {
    if (!blob) return;

    const formData = new FormData();
    formData.append('frame', blob, 'frame.jpg');
    formData.append('level_id', '{{ level.id }}');

    try {
      const response = await fetch('/api/verify_frame', {
        method: 'POST',
        body: formData
      });
      
      const data = await response.json();
      
      if (data.success) {
        const percent = Math.round(data.confidence * 100);
        
        if (data.passed) {
          statusText.textContent = `🎉 通过! 置信度: ${percent}%`;
          statusText.style.color = '#4cd964';
          confidenceFill.style.background = '#28a745';
          confidenceFill.style.width = '100%';
          
          // 延迟跳转
          clearInterval(intervalId);
          setTimeout(() => {
            alert(`恭喜通关！分数：${percent}`);
            window.location.href = "{{ url_for('learn_course', course_id=level.course_id) }}";
          }, 1000);
        } else {
          statusText.textContent = `识别中... 置信度: ${percent}%`;
          statusText.style.color = '#fff';
          confidenceFill.style.background = '#ffc107'; // 黄色
          confidenceFill.style.width = `${percent}%`;
        }
      } else {
        statusText.textContent = "识别错误: " + (data.error || '未知');
      }
    } catch (err) {
      console.error(err);
      // 网络错误不打断，继续重试
    }
  }, 'image/jpeg', 0.6); // 压缩质量 0.6
}

// 页面加载即启动摄像头
window.addEventListener('load', startCamera);

// 页面关闭时停止流
window.addEventListener('beforeunload', () => {
  if (stream) stream.getTracks().forEach(track => track.stop());
});
</script>
</body>
</html>
